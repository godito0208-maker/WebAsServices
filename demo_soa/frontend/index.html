<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo Microservicios</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #resultado { margin-top: 20px; font-size: 24px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Prueba de Microservicios LAMP</h1>
    <button onclick="obtenerSaludo()">¡Llamar al Microservicio!</button>
    <div id="resultado">Esperando...</div>

    <script>
        async function obtenerSaludo() {
            const divResultado = document.getElementById('resultado');
            divResultado.innerText = "Cargando...";

            try {
                // El frontend SOLO habla con el servicio de saludos (Puerto 8002)
                const respuesta = await fetch('http://localhost:8002');
                const datos = await respuesta.json();
                
                divResultado.innerText = datos.mensaje;
            } catch (error) {
                divResultado.innerText = "Error al conectar con el backend.";
            }
        }
    </script>
</body>
</html>
